<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Agent Chat — Sign in</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg'><text y='32' font-size='32'>⚡</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

<div class="auth-layout">

  <!-- Auth card -->
  <div class="auth-card">
    <div class="auth-logo">⚡ AI Agent Chat</div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Login</button>
      <button class="tab"        onclick="switchTab('register')">Register</button>
    </div>

    <form id="login-form" onsubmit="login(); return false;">
      <label>User ID
        <input id="login-userId" type="number" min="1" placeholder="your user id" required>
      </label>
      <label>Email
        <input id="login-email" type="email" placeholder="you@example.com" required>
      </label>
      <label>Password
        <input id="login-password" type="password" placeholder="password" required>
      </label>
      <button type="submit" class="btn-primary full">Sign in</button>
      <p class="form-error" id="login-error"></p>
    </form>

    <form id="register-form" class="hidden" onsubmit="register(); return false;">
      <label>Name
        <input id="reg-name" placeholder="Alice" required>
      </label>
      <label>Email
        <input id="reg-email" type="email" placeholder="you@example.com" required>
      </label>
      <label>Password
        <input id="reg-password" type="password" placeholder="password" required>
      </label>
      <button type="submit" class="btn-primary full">Create account</button>
      <p class="form-error" id="reg-error"></p>
    </form>
  </div>

  <!-- Leaderboard -->
  <div class="auth-leaderboard">
    <div class="lb-header">
      <span class="lb-title">🏆 Leaderboard</span>
    </div>

    <div class="lb-list" id="lb-list">
      <div class="lb-placeholder">Loading…</div>
    </div>

    <div class="lb-pagination">
      <button class="lb-btn" id="lb-prev" onclick="lbPrev()" disabled>← Prev</button>
      <span class="lb-page" id="lb-page">Page 1</span>
      <button class="lb-btn" id="lb-next" onclick="lbNext()">Next →</button>
    </div>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
