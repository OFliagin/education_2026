<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Redis Playground — Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <span class="header-title">Payment Profile</span>
  <div class="header-right">
    <span class="session-indicator">
      <span class="session-dot" id="session-dot"></span>
      <span class="session-label" id="session-label">session active</span>
    </span>
    <span class="user-chip" id="user-chip">User #—</span>
    <button class="btn-exit" onclick="logout()">Exit</button>
  </div>
</header>

<main>

  <!-- no profile -->
  <div id="no-profile" class="card center-card hidden">
    <p class="empty-msg">You don't have a payment profile yet.</p>
    <button class="btn-primary" onclick="createProfile()">Create profile</button>
  </div>

  <!-- has profile -->
  <div id="has-profile" class="hidden">

    <div class="card">
      <div class="card-header">
        <h2>Overview</h2>
        <button class="btn-danger-sm" onclick="deleteProfile()">Delete profile</button>
      </div>
      <div class="stats-grid">
        <div class="stat">
          <span class="stat-label">Plan</span>
          <span class="stat-value" id="info-plan">—</span>
        </div>
        <div class="stat">
          <span class="stat-label">Status</span>
          <span class="badge" id="info-status">—</span>
        </div>
        <div class="stat">
          <span class="stat-label">Currency</span>
          <span class="stat-value" id="info-currency">—</span>
        </div>
        <div class="stat">
          <span class="stat-label">Balance</span>
          <span class="stat-value" id="info-balance">—</span>
        </div>
        <div class="stat">
          <span class="stat-label">Last payment</span>
          <span class="stat-value stat-value--sm" id="info-last">—</span>
        </div>
        <div class="stat">
          <span class="stat-label">Next billing</span>
          <span class="stat-value stat-value--sm" id="info-next">—</span>
        </div>
        <div class="stat">
          <span class="stat-label">Failed payments</span>
          <span class="stat-value" id="info-failed">—</span>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Update profile</h2>
      <div class="form-grid">
        <label>Plan
          <select id="upd-plan">
            <option value="">— keep current —</option>
            <option>BASIC</option>
            <option>PRO</option>
            <option>PREMIUM</option>
          </select>
        </label>
        <label>Currency
          <input id="upd-currency" placeholder="keep current">
        </label>
        <label>Payment status
          <select id="upd-status">
            <option value="">— keep current —</option>
            <option>ACTIVE</option>
            <option>CANCELLED</option>
          </select>
        </label>
        <label>Balance (cents)
          <input id="upd-balance" type="number" min="0" placeholder="keep current">
        </label>
      </div>
      <button class="btn-primary" onclick="updateProfile()">Save changes</button>
    </div>

    <div class="card">
      <h2>Simulate payment</h2>
      <label class="label-inline">Amount (cents)
        <input id="pay-amount" type="number" min="0" placeholder="e.g. 2000" style="max-width:160px">
      </label>
      <div class="btn-row">
        <button class="btn-success" onclick="simulatePayment('SUCCESS')">✓ Payment success</button>
        <button class="btn-danger-outline" onclick="simulatePayment('FAILED')">✗ Payment failed</button>
      </div>
    </div>

  </div><!-- /has-profile -->
</main>

<div id="toast" class="toast hidden"></div>

<script src="app.js"></script>
</body>
</html>
