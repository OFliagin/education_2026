services:
  redis-cluster:
    image: redis:7.2-alpine
    labels:
      org.springframework.boot.ignore: true
    ports:
      - "7010:7010"
      - "7011:7011"
      - "7012:7012"
      - "7013:7013"
      - "7014:7014"
      - "7015:7015"
    command: |
      sh -c '
        set -e
        for port in 7010 7011 7012 7013 7014 7015; do
          mkdir -p /data/$$port
          cat > /data/$$port/redis.conf <<EOF
      port $$port
      cluster-enabled yes
      cluster-config-file nodes.conf
      cluster-node-timeout 5000
      appendonly yes
      protected-mode no
      bind 0.0.0.0
      cluster-announce-ip 127.0.0.1
      cluster-announce-port $$port
      cluster-announce-bus-port 1$$port
      dir /data/$$port
      EOF
          redis-server /data/$$port/redis.conf &
        done

        sleep 5
        if ! redis-cli -p 7010 cluster info 2>/dev/null | grep -q "cluster_state:ok"; then
          redis-cli --cluster create \
            127.0.0.1:7010 \
            127.0.0.1:7011 \
            127.0.0.1:7012 \
            127.0.0.1:7013 \
            127.0.0.1:7014 \
            127.0.0.1:7015 \
            --cluster-replicas 1 \
            --cluster-yes
        fi

        wait
      '
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -p 7010 cluster info | grep -q 'cluster_state:ok'"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - redis-cluster-data:/data

  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      TZ: UTC
      PGTZ: UTC
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  redis-cluster-data:
  postgres-data:
